name: CD Deploy

on:
  push:
    branches: [ main ]

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: SSH Deploy
      uses: appleboy/ssh-action@v1

      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}

        script: |
          docker pull shiitake831dev/api-study
          docker stop api || true
          docker rm api || true
          docker run -d -p 8000:8000 --name api shiitake831dev/api-study