name: CD Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:

  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1

        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            docker pull shiitake831dev/api-study
            docker stop api || true
            docker rm api || true
            docker run -d \
            -p 8000:8000 \
            --name api \
            -e DATABASE_URL=sqlite:///./test.db \
            shiitake831dev/api-study
            